<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rajeev's Voice Counsellor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a1e;
      color: #e2e2e2;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #242428;
      border-radius: 16px;
      width: 680px;
      max-width: 96vw;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    /* ── Header ── */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 24px 28px 16px;
    }

    .header-title { font-size: 18px; font-weight: 500; color: #f0f0f0; }
    .header-sub   { font-size: 13px; color: #888; margin-top: 4px; }

    .header-meta { text-align: right; }
    .meta-row    { display: flex; gap: 20px; }

    .meta-label { font-size: 10px; letter-spacing: 0.08em; color: #666; text-transform: uppercase; }
    .meta-value { font-size: 14px; font-weight: 600; font-variant-numeric: tabular-nums; color: #e0e0e0; margin-top: 2px; }
    .meta-value.status-listening { color: #5bc47a; }
    .meta-value.status-thinking  { color: #f0a742; }
    .meta-value.status-speaking  { color: #6ab0f5; }
    .meta-value.status-transcribing { color: #f0a742; }
    .meta-value.status-error     { color: #e25b5b; }

    /* ── Visualizer area ── */
    .viz-area {
      background: #18181c;
      margin: 0 16px;
      border-radius: 10px;
      height: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* ── Avatar ── */
    .avatar-wrapper {
      position: relative;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-glow {
      position: absolute;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(150, 190, 240, 0.10) 0%, transparent 70%);
      transition: background 0.5s ease;
      pointer-events: none;
    }

    .avatar-glow.listening  { background: radial-gradient(circle, rgba(91, 196, 122, 0.18) 0%, transparent 65%); }
    .avatar-glow.recording  { background: radial-gradient(circle, rgba(226, 91, 91, 0.25) 0%, transparent 65%); }
    .avatar-glow.speaking   { background: radial-gradient(circle, rgba(106, 176, 245, 0.22) 0%, transparent 65%); }
    .avatar-glow.thinking   { background: radial-gradient(circle, rgba(240, 167, 66, 0.18) 0%, transparent 65%); }

    .avatar-ring {
      position: absolute;
      width: 178px;
      height: 178px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      transition: border-color 0.4s, box-shadow 0.4s;
      pointer-events: none;
    }

    .avatar-ring.listening  {
      border-color: rgba(91, 196, 122, 0.6);
      box-shadow: 0 0 16px rgba(91, 196, 122, 0.25), inset 0 0 16px rgba(91, 196, 122, 0.05);
      animation: ring-breathe 2s ease-in-out infinite;
    }
    .avatar-ring.recording  {
      border-color: rgba(226, 91, 91, 0.8);
      box-shadow: 0 0 20px rgba(226, 91, 91, 0.4);
      animation: ring-pulse 0.8s ease-in-out infinite;
    }
    .avatar-ring.speaking   {
      border-color: rgba(106, 176, 245, 0.6);
      box-shadow: 0 0 16px rgba(106, 176, 245, 0.25);
      animation: ring-speak 1s ease-in-out infinite;
    }
    .avatar-ring.thinking   {
      border-color: rgba(240, 167, 66, 0.5);
      box-shadow: 0 0 12px rgba(240, 167, 66, 0.2);
      animation: ring-think 2s ease-in-out infinite;
    }

    @keyframes ring-breathe {
      0%, 100% { box-shadow: 0 0 16px rgba(91, 196, 122, 0.25); }
      50%       { box-shadow: 0 0 28px rgba(91, 196, 122, 0.45); }
    }
    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(226, 91, 91, 0.4); }
      50%       { box-shadow: 0 0 32px rgba(226, 91, 91, 0.7); }
    }
    @keyframes ring-speak {
      0%, 100% { box-shadow: 0 0 16px rgba(106, 176, 245, 0.25); }
      50%       { box-shadow: 0 0 24px rgba(106, 176, 245, 0.5); }
    }
    @keyframes ring-think {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }

    .avatar-svg {
      width: 168px;
      height: 168px;
      border-radius: 50%;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
      transition: transform 0.15s ease;
    }

    .avatar-wrapper:hover .avatar-svg { transform: scale(1.02); }
    .avatar-wrapper:active .avatar-svg { transform: scale(0.98); }

    /* ── Eye blinking CSS animation ── */
    .eyelid {
      transform-box: fill-box;
      transform-origin: top center;
      animation: blink 4.5s ease-in-out infinite;
    }
    .eyelid-right { animation-delay: 0.06s; }

    @keyframes blink {
      0%, 85%, 100% { transform: scaleY(0); }
      91%            { transform: scaleY(1); }
      97%            { transform: scaleY(0); }
    }

    /* ── Hint text ── */
    .orb-hint {
      position: absolute;
      bottom: 20px;
      font-size: 13px;
      color: #555;
      text-align: center;
      transition: opacity 0.3s;
    }

    /* ── Waveform (recording indicator) ── */
    .waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 36px;
      position: absolute;
      bottom: 58px;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .waveform.active { opacity: 1; }
    .waveform .bar {
      width: 3px;
      background: #e25b5b;
      border-radius: 2px;
      animation: wave 0.9s ease-in-out infinite;
    }
    .waveform .bar:nth-child(1) { animation-delay: 0.0s; }
    .waveform .bar:nth-child(2) { animation-delay: 0.1s; }
    .waveform .bar:nth-child(3) { animation-delay: 0.2s; }
    .waveform .bar:nth-child(4) { animation-delay: 0.3s; }
    .waveform .bar:nth-child(5) { animation-delay: 0.4s; }
    .waveform .bar:nth-child(6) { animation-delay: 0.3s; }
    .waveform .bar:nth-child(7) { animation-delay: 0.2s; }
    .waveform .bar:nth-child(8) { animation-delay: 0.1s; }
    .waveform .bar:nth-child(9) { animation-delay: 0.0s; }

    @keyframes wave {
      0%, 100% { height: 5px; }
      50%       { height: 24px; }
    }

    /* ── Transcript ── */
    .transcript-area {
      position: absolute;
      top: 14px;
      left: 20px;
      right: 20px;
      font-size: 13px;
      line-height: 1.5;
      max-height: 100px;
      overflow: hidden;
    }
    .transcript-user  { color: #aaa; }
    .transcript-ai    { color: #b8d0ee; margin-top: 6px; }
    .transcript-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #555; margin-bottom: 2px; }

    /* ── Aria name label ── */
    .aria-name {
      position: absolute;
      bottom: 44px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      color: #666;
      text-transform: uppercase;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 12px;
      padding: 16px 16px 20px;
    }

    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      background: #2e2e34;
      color: #ccc;
    }
    .btn:hover    { opacity: 0.85; }
    .btn:active   { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-start { background: #2e3a4a; color: #a8caee; }
    .btn-end   { background: #3a2e2e; color: #e4a0a0; }
  </style>
</head>

<script>
// ─── State ──────────────────────────────────────────────────────────────────
let ws = null;
let mediaRecorder = null;
let audioChunks = [];
let sessionActive = false;
let sessionStartTime = null;
let timerInterval = null;
let isRecording = false;
let currentState = 'idle';

// Audio queue
let audioQueue = [];
let isPlayingAudio = false;
let currentAudio = null;

// Mouth animation
let mouthAnimInterval = null;
let mouthOpen = false;

const WS_PROTOCOL = location.protocol === 'https:' ? 'wss:' : 'ws:';
const WS_URL = `${WS_PROTOCOL}//${location.host}/ws/session`;

// ─── UI refs ─────────────────────────────────────────────────────────────────
const avatarGlow  = document.getElementById('orb-glow');
const avatarRing  = document.getElementById('avatar-ring');
const mouthGap    = document.getElementById('mouth-gap');
const waveform    = document.getElementById('waveform');
const statusEl    = document.getElementById('status-display');
const hintEl      = document.getElementById('hint-text');
const orbHint     = document.getElementById('orb-hint');
const txArea      = document.getElementById('transcript-area');
const txUser      = document.getElementById('tx-user');
const txAi        = document.getElementById('tx-ai');
const btnStart    = document.getElementById('btn-start');
const btnEnd      = document.getElementById('btn-end');
const timerEl     = document.getElementById('session-timer');

const STATE_LABELS = {
  idle:         'IDLE',
  listening:    'LISTENING',
  transcribing: 'TRANSCRIBING',
  thinking:     'THINKING',
  speaking:     'SPEAKING',
  error:        'ERROR',
};

const STATE_HINTS = {
  idle:         'Start a session to begin',
  listening:    'Hold spacebar to speak',
  transcribing: 'Processing your voice...',
  thinking:     'Saraswati is thinking...',
  speaking:     'Saraswati is speaking...',
  error:        'Something went wrong',
};

function setState(state) {
  currentState = state;
  statusEl.className = `meta-value status-${state}`;
  statusEl.textContent = STATE_LABELS[state] || state.toUpperCase();
  hintEl.textContent = STATE_HINTS[state] || '';

  avatarGlow.className = `avatar-glow ${state}`;
  avatarRing.className = `avatar-ring ${state}`;
  waveform.classList.remove('active');

  if (state === 'speaking') {
    startMouthAnimation();
  } else {
    stopMouthAnimation();
  }
}

// ─── Mouth animation ─────────────────────────────────────────────────────────
function startMouthAnimation() {
  stopMouthAnimation();
  // Natural speech rhythm — cycle mouth open/close
  const rhythms = [120, 180, 100, 200, 150, 130, 170, 90];
  let i = 0;

  function cycle() {
    mouthOpen = !mouthOpen;
    const openAmount = mouthOpen ? (3 + Math.random() * 4) : 0;
    mouthGap.setAttribute('ry', openAmount.toFixed(1));
    const delay = rhythms[i % rhythms.length] + Math.random() * 60;
    i++;
    mouthAnimInterval = setTimeout(cycle, delay);
  }
  cycle();
}

function stopMouthAnimation() {
  if (mouthAnimInterval) {
    clearTimeout(mouthAnimInterval);
    mouthAnimInterval = null;
  }
  mouthOpen = false;
  mouthGap.setAttribute('ry', '0');
}

// ─── Audio queue ─────────────────────────────────────────────────────────────
function enqueueAudio(audioB64) {
  const byteCharacters = atob(audioB64);
  const byteArray = new Uint8Array(byteCharacters.length);
  for (let i = 0; i < byteCharacters.length; i++) {
    byteArray[i] = byteCharacters.charCodeAt(i);
  }
  const blob = new Blob([byteArray], { type: 'audio/mpeg' });
  const url = URL.createObjectURL(blob);
  audioQueue.push(url);
  if (!isPlayingAudio) playNextInQueue();
}

function playNextInQueue() {
  if (audioQueue.length === 0) {
    isPlayingAudio = false;
    currentAudio = null;
    if (sessionActive && currentState === 'speaking') setState('listening');
    return;
  }

  isPlayingAudio = true;
  const url = audioQueue.shift();
  currentAudio = new Audio(url);

  currentAudio.onended = () => {
    URL.revokeObjectURL(url);
    currentAudio = null;
    playNextInQueue();
  };
  currentAudio.onerror = () => {
    URL.revokeObjectURL(url);
    currentAudio = null;
    playNextInQueue();
  };
  currentAudio.play().catch(() => playNextInQueue());
}

function stopAllAudio() {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  audioQueue.forEach(url => URL.revokeObjectURL(url));
  audioQueue = [];
  isPlayingAudio = false;
  stopMouthAnimation();
}

// ─── Timer ───────────────────────────────────────────────────────────────────
function startTimer() {
  sessionStartTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    timerEl.textContent = mins > 0 ? `${mins}m ${secs}s` : `${secs}s`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  timerEl.textContent = '0s';
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWebSocket() {
  return new Promise((resolve, reject) => {
    ws = new WebSocket(WS_URL);
    ws.onopen = () => { console.log('WS connected'); resolve(); };
    ws.onerror = (e) => { console.error('WS error', e); reject(new Error('WebSocket connection failed')); };
    ws.onclose = () => { console.log('WS closed'); if (sessionActive) handleDisconnect(); };
    ws.onmessage = (event) => { handleServerMessage(JSON.parse(event.data)); };
  });
}

function handleServerMessage(msg) {
  switch (msg.type) {
    case 'status':
      if (msg.state === 'listening' && isPlayingAudio) return;
      setState(msg.state);
      break;
    case 'transcript':
      txUser.textContent = msg.text;
      txAi.textContent = '';
      txArea.style.display = 'block';
      break;
    case 'sentence_text':
      txAi.textContent = msg.index === 0 ? msg.text : txAi.textContent + ' ' + msg.text;
      break;
    case 'sentence_audio':
      enqueueAudio(msg.audio);
      break;
    case 'response_done':
      break;
    case 'error':
      console.error('Server error:', msg.message);
      setState('error');
      hintEl.textContent = msg.message;
      setTimeout(() => { if (sessionActive) setState('listening'); }, 3000);
      break;
  }
}

function handleDisconnect() {
  sessionActive = false;
  stopAllAudio();
  setState('idle');
  stopTimer();
  btnStart.disabled = false;
  btnEnd.disabled = true;
  hintEl.textContent = 'Disconnected — click Start to reconnect';
}

// ─── Recording ────────────────────────────────────────────────────────────────
async function startRecording() {
  if (isRecording || currentState !== 'listening') return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
    mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.start(100);
    isRecording = true;
    waveform.classList.add('active');
    avatarGlow.className = 'avatar-glow recording';
    avatarRing.className = 'avatar-ring recording';
    orbHint.style.display = 'none';
  } catch (err) {
    console.error('Mic error:', err);
    hintEl.textContent = 'Microphone access denied';
  }
}

async function stopRecordingAndSend() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  waveform.classList.remove('active');
  orbHint.style.display = '';

  return new Promise((resolve) => {
    mediaRecorder.onstop = async () => {
      const stream = mediaRecorder.stream;
      stream.getTracks().forEach(t => t.stop());
      if (audioChunks.length === 0) { resolve(); return; }

      const blob = new Blob(audioChunks, { type: 'audio/webm' });
      const reader = new FileReader();
      reader.onloadend = () => {
        const base64 = reader.result.split(',')[1];
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'audio_chunk', audio: base64, mimetype: 'audio/webm' }));
        }
        resolve();
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.stop();
  });
}

// ─── Avatar / Orb interaction ─────────────────────────────────────────────────
const orbWrapper = document.getElementById('orb-wrapper');

orbWrapper.addEventListener('mousedown', (e) => {
  e.preventDefault();
  if (sessionActive && currentState === 'listening') {
    startRecording();
  } else if (currentState === 'speaking') {
    stopAllAudio();
    if (ws) ws.send(JSON.stringify({ type: 'cancel' }));
    setState('listening');
  }
});

orbWrapper.addEventListener('mouseup', () => {
  if (isRecording) stopRecordingAndSend();
});

orbWrapper.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (sessionActive && currentState === 'listening') {
    startRecording();
  } else if (currentState === 'speaking') {
    stopAllAudio();
    if (ws) ws.send(JSON.stringify({ type: 'cancel' }));
    setState('listening');
  }
}, { passive: false });

orbWrapper.addEventListener('touchend', () => {
  if (isRecording) stopRecordingAndSend();
});

// Hold spacebar to talk
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && !e.repeat) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    if (sessionActive && currentState === 'listening') {
      startRecording();
    } else if (currentState === 'speaking') {
      stopAllAudio();
      if (ws) ws.send(JSON.stringify({ type: 'cancel' }));
      setState('listening');
    }
  }
});

document.addEventListener('keyup', (e) => {
  if (e.code === 'Space') {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    e.preventDefault();
    if (isRecording) stopRecordingAndSend();
  }
});

// ─── Session control ──────────────────────────────────────────────────────────
async function startSession() {
  btnStart.disabled = true;
  try {
    await connectWebSocket();
    sessionActive = true;
    startTimer();
    setState('listening');
    txArea.style.display = 'none';
    btnEnd.disabled = false;
    orbHint.textContent = 'Hold spacebar to speak';
  } catch (err) {
    hintEl.textContent = 'Could not connect to backend. Is it running?';
    btnStart.disabled = false;
  }
}

function endSession() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'end_session' }));
    ws.close();
  }
  stopAllAudio();
  sessionActive = false;
  setState('idle');
  stopTimer();
  btnStart.disabled = false;
  btnEnd.disabled = true;
  txArea.style.display = 'none';
}
</script>
